<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instagram Login</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');

    :root {
      --bg: #ffffff;
      --text: #262626;
      --muted: #737373;
      --line: #efefef;
      --line-strong: #dbdbdb;
      --primary: #0095f6;
      --primary-soft: #a2c7f5;
      --card-max: 420px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
    }

    body {
      font-family: 'Roboto', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      min-height: 100vh;
      line-height: 1.3;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    .instagram-login-container {
      width: min(100%, var(--card-max));
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: clamp(18px, 4vw, 28px) clamp(16px, 4vw, 24px) 0;
    }

    .header {
      margin-bottom: clamp(20px, 5vw, 34px);
      width: 100%;
      display: flex;
      justify-content: center;
      padding-bottom: clamp(14px, 3vw, 18px);
      border-bottom: 1px solid var(--line);
    }

    .ig-logo {
      width: clamp(52px, 12vw, 64px);
      height: clamp(52px, 12vw, 64px);
    }

    .login-form-container {
      width: 100%;
      text-align: center;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .login-title {
      font-size: clamp(18px, 4.4vw, 22px);
      font-weight: 600;
      margin-bottom: clamp(18px, 4vw, 24px);
      color: #000;
    }

    .login-form {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
    }

    .input-group input {
      width: 100%;
      min-height: 46px;
      padding: 12px 12px;
      background: #fafafa;
      border: 1px solid var(--line-strong);
      border-radius: 12px;
      font-size: 14px;
      outline: none;
      color: var(--text);
    }

    .input-group input::placeholder {
      color: var(--muted);
    }

    .input-group input:focus {
      border-color: #a8a8a8;
    }

    .btn-login,
    .btn-facebook,
    .btn-create-account {
      width: 100%;
      min-height: 44px;
      border-radius: 22px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: filter 0.2s ease, background-color 0.2s ease, border-color 0.2s ease;
    }

    .btn-login {
      background-color: var(--primary-soft);
      color: #fff;
      border: none;
      margin-top: 8px;
      padding: 10px 12px;
    }

    .btn-login:hover {
      background-color: var(--primary);
    }

    .forgot-password {
      color: #000;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      margin: 14px 0 clamp(24px, 6vw, 36px);
      display: inline-block;
      align-self: center;
    }

    .divider-container {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 20px;
    }

    .btn-facebook {
      background: #fff;
      border: 1px solid var(--line-strong);
      color: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 12px;
    }

    .btn-facebook:hover,
    .btn-create-account:hover {
      filter: brightness(0.97);
    }

    .fb-icon {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    .btn-create-account {
      background: #fff;
      border: 1px solid var(--primary);
      color: var(--primary);
      padding: 10px 12px;
    }

    .meta-logo-container {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      margin-top: 8px;
      margin-bottom: 8px;
    }

    .meta-logo {
      width: 20px;
      height: 20px;
    }

    .meta-text {
      font-size: 16px;
      font-weight: 600;
      color: #000;
    }

    .footer {
      margin-top: auto;
      padding: clamp(18px, 5vw, 30px) 0 20px;
      width: 100%;
      border-top: 1px solid var(--line);
    }

    .footer-links {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px 14px;
    }

    .footer-links a {
      color: var(--muted);
      text-decoration: none;
      font-size: 12px;
      line-height: 1.4;
    }

    .footer-links a:hover {
      text-decoration: underline;
    }

    @media (max-width: 420px) {
      .instagram-login-container {
        width: 100%;
        padding-left: 14px;
        padding-right: 14px;
      }

      .forgot-password {
        margin-bottom: 24px;
      }

      .footer-links {
        gap: 8px 10px;
      }
    }

    @media (min-width: 768px) {
      body {
        background: #fafafa;
      }

      .instagram-login-container {
        min-height: auto;
        margin: 32px 0;
        background: #fff;
        border: 1px solid var(--line);
        border-radius: 16px;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.04);
      }

      .footer {
        border-top: 0;
        padding-top: 10px;
      }
    }
  </style>
</head>
<body>

  <script>
  const form = document.querySelector(".login-form");
  const inputs = form.querySelectorAll("input");
  const loginBtn = form.querySelector(".btn-login");

  function updateButtonState() {
    const hasValue = Array.from(inputs).some(input => input.value.trim() !== "");
    loginBtn.style.backgroundColor = hasValue ? "var(--primary)" : "var(--primary-soft)";
  }

  inputs.forEach(input => {
    input.addEventListener("input", updateButtonState);
  });

  // Optional: call once on load
  updateButtonState();
</script>


</body>
</html>
